<!DOCTYPE html>
    <html lang="pt-br">
    <meta charset="UTF-8">
       <meta name="viewport" content="width=device-width, initial-scale=1.0">
       <title> Conversor dinamico </title>
       <head>
       <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #eef2f7;
        }
        .converter-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }
        .field {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        label { font-size: 0.85rem; color: #666; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus { border-color: #007bff; }
        .equals { font-size: 1.5rem; margin-top: 20px; color: #999; }
    </style>
</head>


       <body>
        <div class="converter-card">
            <h2> Convertor de clima </h2>
                <div class="input-grup">
                    <label> Celsius (°C)</label>
                    <input type="number" id="celsius" step="0.1" placeholder="0.00">
        </div>
        <div class="equals">=</div>
        <div class="field">
            <label>Fahrenheit (°F)</label>
            <input type="number" id="fahrenheit" step="0.1" placeholder="32.00">
                </div>
        </div>
        </div>

       </body>
<script>
    const inputCelsius = document.getElementById('celsius');
    const inputFahrenheit = document.getElementById('fahrenheit');

    
    inputCelsius.addEventListener('input', () => {
        const c = parseFloat(inputCelsius.value);
        if (!isNaN(c)) {
            const f = (c * 9/5) + 32;
            inputFahrenheit.value = f.toFixed(2);
        } else {
            inputFahrenheit.value = "";
        }
    });


    inputFahrenheit.addEventListener('input', () => {
        const f = parseFloat(inputFahrenheit.value);
        if (!isNaN(f)) {
            const c = (f - 32) * 5/9;
            inputCelsius.value = c.toFixed(2);
        } else {
            inputCelsius.value = ""; 
        }
    });
</script>

</body>
</html>
